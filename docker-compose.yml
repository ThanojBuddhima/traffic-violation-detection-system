services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./violations:/app/violations
      - ./database:/app/database
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: celery -A api.tasks.celery_app worker --loglevel=info
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./violations:/app/violations
      - ./database:/app/database
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: violations
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
